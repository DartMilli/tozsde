name: validation-runner

on:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest -q

  validation:
    needs: tests
    runs-on: ubuntu-latest
    env:
      VALIDATION_TICKER: VOO
      VALIDATION_START_DATE: 2022-01-01
      VALIDATION_END_DATE: 2023-12-31
      VALIDATION_MODE: quick
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run validation runner
        run: |
          python -m app.validation.validation_runner --mode quick
