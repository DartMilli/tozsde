name: train-models

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Training mode (minimal|full)"
        required: true
        default: "minimal"
      ticker:
        description: "Ticker for minimal training"
        required: false
        default: "VOO"
      reward_strategy:
        description: "Reward strategy for minimal training"
        required: false
        default: "portfolio_value"
      force_train:
        description: "Force training regardless of fingerprint"
        required: false
        default: "false"
      promote_top_n:
        description: "Top-N models to promote in full sweep"
        required: false
        default: "3"

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      ENABLE_RL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check training fingerprint
        id: fingerprint
        run: |
          set +e
          python scripts/training_fingerprint.py --check
          code=$?
          echo "exit_code=$code" >> $GITHUB_OUTPUT
          exit 0

      - name: Decide training
        id: decide
        run: |
          force_input="${{ inputs.force_train }}"
          exit_code="${{ steps.fingerprint.outputs.exit_code }}"
          if [ "$force_input" = "true" ]; then
            echo "train_required=true" >> $GITHUB_OUTPUT
          elif [ "$exit_code" = "0" ]; then
            echo "train_required=false" >> $GITHUB_OUTPUT
          else
            echo "train_required=true" >> $GITHUB_OUTPUT
          fi

      - name: Minimal training (walk-forward + DQN/PPO)
        if: steps.decide.outputs.train_required == 'true' && inputs.mode == 'minimal'
        run: |
          python main.py walk-forward ${{ inputs.ticker }}
          python scripts/train_rl.py --ticker ${{ inputs.ticker }} --model-type DQN --reward-strategy ${{ inputs.reward_strategy }}
          python scripts/train_rl.py --ticker ${{ inputs.ticker }} --model-type PPO --reward-strategy ${{ inputs.reward_strategy }}

      - name: Full training (run_training + backtest)
        if: steps.decide.outputs.train_required == 'true' && inputs.mode == 'full'
        run: |
          python scripts/full_sweep.py --promote-top-n ${{ inputs.promote_top_n }}

      - name: Write training fingerprint
        if: steps.decide.outputs.train_required == 'true'
        run: |
          python scripts/training_fingerprint.py --write
