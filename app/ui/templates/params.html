<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>{{ ticker }} - Parameterek</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <h1>{{ ticker }} - Optimalizalt parameterek</h1>

    <form method="get" action="/params" style="margin-bottom: 20px;">
        <label for="ticker">Ticker:</label>
        <select name="ticker" id="ticker">
            {% for t in tickers %}
            <option value="{{ t }}" {% if t==ticker %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
        <button type="submit">Mutatas</button>
    </form>

    <table class="indicator-table" style="display: table;">
        <thead>
            <tr>
                <th>Parameter</th>
                <th>Ertek</th>
            </tr>
        </thead>
        <tbody>
            {% for key, value in params.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
